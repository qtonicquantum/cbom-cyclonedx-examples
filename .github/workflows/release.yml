name: release
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install cyclonedx-python-lib jsonschema
      - name: Validate before release
        run: bash scripts/validate-all.sh
      - name: Bundle examples
        run: |
          mkdir -p dist
          tar -czf dist/cbom-cyclonedx-examples-${GITHUB_REF_NAME}.tar.gz examples/ docs/ README.md LICENSE LICENSE-CONTENT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
